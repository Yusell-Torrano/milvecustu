<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para Muñequita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080810;
  --gold: #c8a86c;
  --gold-b: #e2c578;
  --cream: #f0e4d0;
  --text: #ddd0c0;
  --muted: #6a5a48;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Raleway', sans-serif;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  overflow-x: hidden;
}

canvas#bg {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ---- vignette overlay ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(8,8,16,0.85) 100%);
  pointer-events: none;
  z-index: 1;
}

/* ---- progress dots ---- */
#progress {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 7px;
  z-index: 20;
  opacity: 0;
  animation: fade 1s ease 0.4s forwards;
}
.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.4s;
}
.dot.active { background: var(--gold-b); box-shadow: 0 0 6px var(--gold-b); }
.dot.done   { background: var(--gold); opacity: 0.5; }

/* ---- main wrapper ---- */
#app {
  position: relative;
  z-index: 10;
}

.page {
  min-height: 100dvh;
  max-width: 420px;
  margin: 0 auto;
  padding: 72px 28px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ---- chapter label ---- */
.ch-label {
  font-family: var(--sans);
  font-weight: 200;
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  text-align: center;
  margin-bottom: 6px;
  opacity: 0;
  animation: up 0.9s ease 0.6s forwards;
}

/* ---- icon ---- */
.ch-icon {
  font-size: 22px;
  color: var(--gold);
  text-align: center;
  display: block;
  margin-bottom: 10px;
  opacity: 0;
  animation: fade 1s ease 0.5s forwards;
}

/* ---- chapter title ---- */
.ch-title {
  font-family: var(--serif);
  font-size: clamp(36px, 9vw, 46px);
  font-weight: 300;
  font-style: italic;
  color: var(--cream);
  text-align: center;
  line-height: 1.1;
  margin-bottom: 36px;
  opacity: 0;
  animation: up 0.9s ease 0.9s forwards;
}

/* ---- poem ---- */
.poem {
  font-family: var(--serif);
  font-size: clamp(16px, 4.5vw, 19px);
  font-weight: 300;
  font-style: italic;
  line-height: 1.95;
  color: var(--text);
  padding-left: 18px;
  border-left: 1px solid rgba(200, 168, 108, 0.4);
  align-self: flex-start;
  width: 100%;
  opacity: 0;
  animation: up 0.9s ease 1.2s forwards;
  margin-bottom: 10px;
}
.poem strong {
  color: var(--cream);
  font-weight: 400;
}
.poem em {
  color: var(--gold-b);
}
.poem-author {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  font-style: normal;
  text-align: right;
  margin-top: 14px;
}

/* ---- divider ---- */
.divider {
  width: 36px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 28px 0;
  opacity: 0;
  animation: fade 0.8s ease 1.6s forwards;
  flex-shrink: 0;
}

/* ---- message ---- */
.msg {
  font-family: var(--sans);
  font-size: clamp(13px, 3.5vw, 14px);
  font-weight: 300;
  line-height: 1.9;
  color: var(--text);
  text-align: center;
  opacity: 0;
  animation: up 0.9s ease 1.8s forwards;
  margin-bottom: 28px;
}

/* ---- riddle ---- */
.riddle-lbl {
  font-family: var(--sans);
  font-weight: 200;
  font-size: 9px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  text-align: center;
  margin-bottom: 14px;
  opacity: 0;
  animation: fade 0.8s ease 2.1s forwards;
}
.riddle-box {
  background: rgba(200, 168, 108, 0.04);
  border: 1px solid rgba(200, 168, 108, 0.18);
  padding: 22px 20px;
  font-family: var(--serif);
  font-size: clamp(16px, 4.3vw, 18px);
  font-style: italic;
  line-height: 1.85;
  color: var(--cream);
  text-align: center;
  opacity: 0;
  animation: up 0.9s ease 2.3s forwards;
  width: 100%;
}
.riddle-box strong {
  color: var(--gold-b);
  font-style: normal;
  font-weight: 400;
  display: block;
  margin-top: 14px;
  font-size: 0.95em;
  letter-spacing: 0.02em;
}
.riddle-box em {
  font-size: 0.85em;
  color: var(--muted);
  display: block;
  margin-top: 10px;
}

/* ---- FINAL CHAPTER ---- */
.final-verse {
  font-family: var(--serif);
  font-size: clamp(17px, 4.5vw, 20px);
  font-weight: 300;
  font-style: italic;
  line-height: 2;
  color: var(--text);
  text-align: center;
  opacity: 0;
  animation: up 0.9s ease 1.1s forwards;
  margin-bottom: 12px;
}
.final-big {
  font-family: var(--serif);
  font-size: clamp(48px, 13vw, 64px);
  font-weight: 600;
  font-style: italic;
  color: var(--gold-b);
  text-align: center;
  line-height: 1.05;
  margin: 18px 0 28px;
  opacity: 0;
  animation: bloom 1.2s ease 2.2s forwards;
  text-shadow: 0 0 40px rgba(226, 197, 120, 0.25);
}
.cta {
  display: inline-block;
  margin-top: 10px;
  padding: 15px 38px;
  border: 1px solid var(--gold);
  color: var(--gold);
  font-family: var(--sans);
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  background: transparent;
  transition: background 0.35s, color 0.35s;
  opacity: 0;
  animation: up 0.9s ease 3.2s forwards;
}
.cta:hover, .cta:active {
  background: var(--gold);
  color: var(--bg);
}

/* ---- 404 ---- */
.err {
  text-align: center;
  font-family: var(--serif);
  font-style: italic;
  font-size: 20px;
  color: var(--muted);
  padding: 40px 24px;
}

/* ---- keyframes ---- */
@keyframes fade { from { opacity:0 } to { opacity:1 } }
@keyframes up   { from { opacity:0; transform:translateY(18px) } to { opacity:1; transform:translateY(0) } }
@keyframes bloom { 
  0% { opacity:0; transform:scale(0.85) }
  60% { opacity:1; transform:scale(1.04) }
  100% { opacity:1; transform:scale(1) }
}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div id="progress"></div>
<div id="app"></div>

<script>
/* ============================================================
   CAPÍTULOS  —  Edita los textos y URLs aquí
   ============================================================ */
const CAPS = [
  /* ── 1 ── */
  {
    label:"Capítulo I", icon:"✦", title:"El principio",
    poem:`Te vi y pensé <em>tengo que conocerte,</em><br>
te conocí y pensé <em>ojalá nos enamoremos,</em><br>
nos enamoramos<br>
y pensé <em>debo estar soñando</em><br>
y no lo estaba...`,
    author:"Desconocido por mi, conocido quizá por ti",
    msg:"Fue saliendo del elevador de SEDESHU, con ese vestido bombacho, toda empoderada tratando de desifrar a donde tenías que ir, y cual  dueña del edificio tomaste tu rumbo.  Fue entonces cuando supe que iba a hacer lo que fuera por conocerte. Desde ese día, no he parado.",
    riddle:`ZCuando zumba, nadie duerme.<br>
Guarda el frío… y también algunos secretos.<br>
Hubo una tarde en que compartimos su esencia,<br>
blanca, suave, casi inocente…<br>
aunque hacerlo ahí tenía cierto riesgo.<br>
El médico quizá lo habría desaprobado.<br>
Nosotros, jamás.<br>
Sube.<br>
Baja.<br>
Y guarda el eco de aquella travesura.<br>
Si buscas bien, encontrarás una pista congelada.<br><br>
<em>¿Qué soy y dónde estoy?</em>`
  },
  /* ── 2 ── */
  {
    label:"Capítulo II", icon:"☽", title:"La primera locura",
    poem:`Quisiera decirte<br>
que me encantas<br>
pero es mentira;<br>
me fascinas, me apasionas.<br>
Decirte que me encantas<br>
sería poco<br>
porque la verdad<br>
es que <strong>me vuelves loco.</strong>`,
    author:"Valentín Gasca",
    msg:"Estabas en cuarentena. Podías estar contagiada. Compartí ese helado de vainilla contigo sin pensarlo dos veces. Que conste: el amor no le teme al COVID.",
    riddle:`Soy el último testigo de tu día<br>
y el primero de tu mañana.<br>
Lo que se deja encima de mí<br>
dice mucho de lo que no se dice en voz alta.<br>
Hubo una primera noche, lejos de aquí,<br>
donde alguien como yo fue el principio de todo.<br><br>
<em>¿Dónde estoy?</em>`
  },
  /* ── 3 ── */
  {
    label:"Capítulo III", icon:"🌙", title:"Bendito destino",
    poem:`...pasa que te adoro,<br>
pasa que me encantas,<br>
que todos los planes salen perfectos<br>
cuando formas parte de ellos,<br>
que todos los sueños lucen alcanzables<br>
haciendo equipo contigo,<br>
pasa que te pienso de lunes a domingo,<br>
que cada día me pareces más hermosa,<br>
y es por ti que cada noche me repito<br>
<em>bendito destino.</em>`,
    author:"Andrés Ixtepan",
    msg:"La misma luna que vimos desde Tepoztlán. La misma en Ixtapa, en Dolores Hidalgo, en Italia, en Brujas. Siempre ella. Y siempre tú a mi lado.",
    riddle:`No tengo motor ni pantalla.<br>
Pero he visto más mundo que la mayoría.<br>
Me cierran con nostalgia y me abren con emoción.<br>
Cargo con lo que no cabe en palabras:<br>
sellos, fotos, recuerdos de lugares<br>
que ya nos pertenecen.<br><br>
<em>¿Dónde estoy?</em>`
  },
  /* ── 4 ── */
  {
    label:"Capítulo IV", icon:"✈", title:"Las aventuras",
    poem:`Tengo ganas de escalar<br>
a la cima del monte más alto<br>
para gritarle al mundo<br>
lo mucho que te quiero.<br><br>
Tengo ganas de llevarte de la mano<br>
por las calles del barrio,<br>
y pasar cada fin de semana<br>
en el cine o en los tacos.`,
    author:"Xodó",
    msg:"Tepoztlán, Ixtapa, Atotonilco, Italia, Brujas. Cinco destinos, mil recuerdos, y todavía la lista de pendientes más larga del mundo. Contigo el mundo cabe en una maleta y una tarde de domingo.",
    riddle:`Aquí no hubo pasaportes ni boletos.<br>
Pero sí madrugadas largas,<br>
pantallas que no apagan solos<br>
y victorias que nadie más vio venir.<br>
Soy donde los sueños dejan de ser sueños<br>
y se convierten en plan.<br><br>
<em>¿Dónde estoy?</em>`
  },
  /* ── 5 ── */
  {
    label:"Capítulo V", icon:"⟡", title:"El equipo",
    poem:`El éxito de una relación larga y sana<br>
no es solo con amor,<br>
es una construcción diaria de cuidado,<br>
de pláticas incómodas,<br>
de apoyo incondicional,<br>
de desacuerdos, de crecimiento,<br>
de mucho aprendizaje.<br>
Pero lo bonito cuesta<br>
y vale la pena.`,
    author:"Amor de un café",
    msg:"Cada meta que hemos alcanzado juntos vale más de lo que imaginas. No porque la logramos, sino porque la logramos juntos. Eso no tiene precio.",
    riddle:`Uno siempre se queda dormido primero.<br>
El otro lo nota y no dice nada.<br>
Soy el lugar donde el mundo se achica,<br>
donde el silencio pesa bien<br>
y el tiempo no tiene prisa.<br>
Netflix corre solo aquí. Los tacos también llegan.<br><br>
<em>¿Dónde estoy?</em>`
  },
  /* ── 6 ── */
  {
    label:"Capítulo VI", icon:"♡", title:"Eligiéndote",
    poem:`Porque para cosas bonitas<br>
en esta vida, tú;<br>
para tocar el infinito tus besos;<br>
para perder el miedo tu locura;<br>
para llenarme el alma de felicidad<br>
tu compañía.<br>
Porque para todo y para siempre,<br>
<em>sencillamente tú.</em>`,
    author:"J. Wailen",
    msg:"Cuatro años eligiéndote cada mañana. Cuatro años sin dudarlo ni un solo día. Y todavía me faltan muchos más.",
    riddle:`Esta última pista no vive en ningún rincón de esta casa.<br><br>
Vive en tu cajón favorito,<br>
en el vestido que más te gusta,<br>
en los zapatos que duelen un poco<br>
pero que siempre valen la pena.<br><br>
Esta noche hay una mesa reservada.<br>
Solo falta que te arregles.<br><br>
<em>Te espero.</em>`
  },
  /* ── 7 FINAL ── */
  {
    label:"Capítulo VII", icon:"◈", title:"Mil veces tú",
    isFinal: true,
    finalVerse:`Si pudiera darte una sola cosa en esta vida,<br>
te daría la posibilidad de verte a través de mis ojos,<br>
para que pudieras ver a la gran persona<br>
con la que decidí compartir mi camino.<br><br>
Viviré todos los días eligiendo que seas mi compañera,<br>
mi apoyo y mi cómplice,<br>
eligiéndote a ti por encima<br>
de la adversidad y los desafíos.<br><br>
Esa es mi promesa para ti:<br>
que por encima de los retos y el orgullo<br>
y de la mano del amor,<br>
serás siempre...`,
    bigText:"mil veces tú",
    msg:"Cuatro años. Cuatro capítulos de una historia que apenas comienza. Esto es solo el comienzo de todo lo que viene.",
    /* ↓↓↓ REEMPLAZA ESTA URL CON LA DE TU VIDEO ↓↓↓ */
    videoUrl:"https://TU-ENLACE-DE-VIDEO-AQUI"
  }
];

/* ============================================================
   PARTÍCULAS (estrellas flotantes)
   ============================================================ */
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let   stars  = [];

function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initStars(){
  stars = [];
  const n = Math.floor((canvas.width * canvas.height) / 7000);
  for(let i=0;i<n;i++){
    stars.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      r: Math.random()*1.1+0.2,
      a: Math.random()*0.55+0.08,
      vy: Math.random()*0.28+0.04,
      vx: (Math.random()-0.5)*0.12
    });
  }
}

function tick(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,168,108,${s.a})`;
    ctx.fill();
    s.y-=s.vy; s.x+=s.vx;
    if(s.y<-2){ s.y=canvas.height+2; s.x=Math.random()*canvas.width; }
    if(s.x<0) s.x=canvas.width;
    if(s.x>canvas.width) s.x=0;
  });
  requestAnimationFrame(tick);
}

resize(); initStars(); tick();
window.addEventListener('resize',()=>{ resize(); initStars(); });

/* ============================================================
   RENDER
   ============================================================ */
function dots(n){
  const el=document.getElementById('progress');
  el.innerHTML='';
  for(let i=1;i<=7;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===n?' active':i<n?' done':'');
    el.appendChild(d);
  }
}

function render(){
  const p = new URLSearchParams(location.search);
  const c = parseInt(p.get('c'))||1;
  const app = document.getElementById('app');

  if(c<1||c>7){
    app.innerHTML=`<div class="page"><p class="err">No encontré esta pista.<br><br>¿Segura que escaneaste bien?</p></div>`;
    return;
  }

  dots(c);
  const ch = CAPS[c-1];

  if(ch.isFinal){
    app.innerHTML=`<div class="page">
      <span class="ch-icon">${ch.icon}</span>
      <div class="ch-label">${ch.label}</div>
      <p class="final-verse">${ch.finalVerse}</p>
      <div class="final-big">${ch.bigText}</div>
      <div class="divider" style="animation-delay:2.7s"></div>
      <p class="msg" style="animation-delay:2.9s">${ch.msg}</p>
      <a href="${ch.videoUrl}" class="cta">▶ &nbsp; Ver nuestro video</a>
    </div>`;
  } else {
    app.innerHTML=`<div class="page">
      <span class="ch-icon">${ch.icon}</span>
      <div class="ch-label">${ch.label}</div>
      <h1 class="ch-title">${ch.title}</h1>
      <blockquote class="poem">
        ${ch.poem}
        <div class="poem-author">— ${ch.author}</div>
      </blockquote>
      <div class="divider"></div>
      <p class="msg">${ch.msg}</p>
      <div class="riddle-lbl">~ siguiente pista ~</div>
      <div class="riddle-box">${ch.riddle}</div>
    </div>`;
  }
}

render();
</script>
</body>
</html>
